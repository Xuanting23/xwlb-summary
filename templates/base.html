<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}新闻联播每日总结{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <header class="site-header">
        <div class="container">
            <a href="/" class="logo">
                <span class="logo-icon">📰</span>
                <span class="logo-text">新闻联播·每日总结</span>
            </a>
            <nav>
                <a href="https://tv.cctv.com/live/cctv13/" target="_blank" class="nav-link live-link" title="CCTV-13 新闻频道直播">📺 直播</a>
                <a href="/" class="nav-link">今日摘要</a>
                <a href="/history" class="nav-link">历史回顾</a>
            </nav>
        </div>
    </header>

    <main class="site-main">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>仅供个人学习研究使用 · 文字稿版权归 CCTV 所有 · AI 摘要由 DeepSeek 生成</p>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
